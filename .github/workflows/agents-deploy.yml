name: agents-deploy

on:
  push:
    branches:
      - main # Trigger on push to main branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build -t asia-south1-docker.pkg.dev/edunova-1/ppt-gen-agents/api:latest .

      - name: Push Docker image
        run: |
          docker push asia-south1-docker.pkg.dev/edunova-1/ppt-gen-agents/api:latest
